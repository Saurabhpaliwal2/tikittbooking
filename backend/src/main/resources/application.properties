# Server
server.port=8081

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/tikittdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=tikitt-secret-key-bus-booking-app-2024-very-long-secret-key-for-security
jwt.expiration=86400000

# Logging
logging.level.com.tikitt=DEBUG
logging.level.org.springframework.security=DEBUG

# Spring Mail (SMTP Configuration)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
